<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashame Movie</title>
    <link rel="icon" type="images/png" sizes="200x200" href="/images/Favicon/200x200.png">
    <style>
       body {
        background-color: #000000;
        margin: 0;
        padding-bottom: 800px;
    }
    html, body {
        overflow-x: hidden;
    }
    .logo {
        position: relative;
        top: 18px;
        left: 16px;
        width: 10vw;
        max-width: 120px;
    }
    .nama-blog {
        font-family: "KeinannPOP";
        color: #9fa195;
        -webkit-text-stroke: 1px rgb(8, 8, 8);
        transform: translateY(8px);
        font-size: 3rem;
    }
    .header {
        display: flex;
        align-items: center;
        padding: 16px;
        gap: 20px;
        margin-left: 80px ;
        position: relative;
        min-height: 150px;
        color: inherit;
        text-decoration: none;
    }
    .search-box {
        display: flex;
        gap: 8px;
        margin-left: auto;
        margin-right: 150px;
        margin-top: 40px;
    }
    .search-box input {
        width: 200px;
        padding: 8px 12px;
        border-radius: 8px;
    }
    .search-box button {
        padding: 8px 14px;
        cursor: pointer;
        border-radius: 8px;
    }
    .tipe-film {
        display: flex;
        gap: 50px;
        position: absolute;
        color: aliceblue;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) translateX(-80px) translateY(90px);
        text-align: center;
        font-family: "HGPSoeiKakupoptai";
        -webkit-text-stroke: 1px #818181;
        cursor: default;
        font-size: 30px;
    }


    .text-1 {
        color: aliceblue;
        font-size: 20px;
        font-family: "Mochiy Pop One";
        padding: 40px;
        transform: translateX(30px) translateY(60px);
    }
    .kotak-konten {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
        padding: 32px;
    }
    .kontennya {
        background-color: #646464;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        font-family: "Mochiy Pop One";
        border: 2px solid #fefefe;
        position: relative;
        font-size: 0.65rem;
    }
    .kontennya img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
    }
    .kontennya title {
        color: #fcfcfc;
        padding: 12px 16px;
        font-size: 0.95rem;
    }
    .kontennya:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .judul-film {
        transform: translateX(10%);
        font-size: 13px;

    }
    
    .kontennya a {
        text-decoration: none;
        color: inherit;
        display: block;
    }


    </style>
 </head>
 <body>
    <div class="header">
        <a href="/index.html">
    <img src="/images/Ashame.png" alt="Ashame" class="logo">
    </a>
    <h1 class="nama-blog">
        Ashame
    </h1>
    <div class="tipe-film">
        <p>
            Movie
        </p>
    </div>
    <form class="search-box">
        <input type="search" placeholder="Pencarian">
        <button type="submit">🔍</button>
    </form>
   </div>
   <p class="text-1">
    Terbaru
   </p>
   <div class="kotak-konten">
    <div class="kontennya">
        <a href="/film/isho-kokai.html">
        <img src="/images/Isho, kokai.jpg" alt="Isho, kokai">
        <h2 class="judul-film"> 
            Isho, Kokai (2025) 
        </h2>
        </a>
    </div>
   </div> 
</body>
</html>
