<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isho, Kokai (2025)</title>
    <style>
       body {
        background-color: #000000;
        margin: 0;
        padding-bottom: 800px;
    }
    
    .logo {
        position: relative;
        top: 18px;
        left: 16px;
        width: 10vw;
        max-width: 120px;
    }
    .nama-blog {
        font-family: "KeinannPOP";
        color: #9fa195;
        -webkit-text-stroke: 1px rgb(8, 8, 8);
        transform: translateY(8px);
        font-size: 3rem;
        cursor: default;
    }
    .header {
        display: flex;
        align-items: center;
        padding: 16px;
        gap: 20px;
        margin-left: 80px ;
        position: relative;
        min-height: 150px;
    }
    .search-box {
        display: flex;
        gap: 8px;
        margin-left: auto;
        margin-right: 150px;
        margin-top: 40px;
    }
    .search-box input {
        width: 200px;
        padding: 8px 12px;
        border-radius: 8px;
    }
    .search-box button {
        padding: 8px 14px;
        cursor: pointer;
        border-radius: 8px;
    }
    .tipe-film {
        display: flex;
        gap: 50px;
        position: absolute;
        color: aliceblue;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) translateX(-80px) translateY(90px);
        text-align: center;
        font-family: "HGPSoeiKakupoptai";
        -webkit-text-stroke: 1px #818181;
        cursor: pointer;   
    }
    .text-1 {
        color: aliceblue;
        font-size: 20px;
        font-family: "Mochiy Pop One";
        padding: 60px;
        transform: translateX(30px) translateY(60px);
    }
     .judul-film {
        transform: translateX(10%);
        font-size: 13px;

    }
    .Series:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .Movie:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .Variety:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .Youtube:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .List:hover {
        transform: translateY(-6px);
         transition: 0.2s ease;
    }
    .header a {
        text-decoration: none;
        color: inherit;
        display: block;
    }
    .gambar-film {
        display: block;
        position: relative;
        top: 10px;
        left: 100px;
        width: 40%;
    }
       </style>
 </head>
 <body>
    <div class="header">
        <a href="/ashame.html">
    <img src="/images/Ashame.png" alt="Ashame" class="logo">
    </a>
    <h1 class="nama-blog">
        Ashame
    </h1>
    <div class="tipe-film">
        <p class="Series">
            Series
        </p>
        <p class="Movie">
            Movie
        </p>
        <p class="Variety">
            Variety
        </p>
        <p class="Youtube">
            Youtube
        </p>
        <p class="List">
            List
        </p>
    </div>
    <form class="search-box">
        <input type="search" placeholder="Pencarian">
        <button type="submit">🔍</button>
    </form>
   </div>
   <p class="text-1">
    Isho, Kokai (2025)<br>
    遺書
   </p>
   <img src="/images/Isho, kokai.jpg" class="gambar-film">
   </body>
   </html>
